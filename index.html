<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TREVED</title>
    <style>
        /* Osnovni stili za čisto in profesionalno postavitev */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212; /* Temno ozadje, primerno za razvijalce */
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .profile-icon {
            width: 120px;
            height: 120px;
            border-radius: 5%; /* Naredi ikono okroglo */
            object-fit: cover;
             /* Lep zelen rob okoli ikone */
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #aaaaaa;
            margin-bottom: 40px;
        }

        footer {
            margin-top: auto;
            padding-bottom: 20px;
        }

        footer a {
            color: #555555; /* Zelo majhna in diskretna siva povezava */
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        footer a:hover {
            color: #555555; /* Ko greš z miško čez, NE zasveti zeleno */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TREVED</h1>
        
        <img src="logo_treved.jpg" alt="Treved Ikona" class="profile-icon">
        
        <p>
            Dobrodošli na moji uradni razvijalski strani. Tukaj razvijam preproste, 
            prijazne in učinkovite Android aplikacije ter UI prototipe. 
            Preverite moje objavljene projekte na Google Play trgovini.
        </p>
    </div>

    <footer>
        <a href="personal.html" id="koda-povezava">Koda klica: </a>
    </footer>

    <script>
        // Ta funkcija se izvede avtomatsko, ko se spletna stran v celoti naloži
        window.onload = function() {
            const znaki = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let nakljucnaKoda = '';
            const dolzina = 14;

            // Zanka, ki 14-krat izbere naključen znak
            for (let i = 0; i < dolzina; i++) {
                const nakljucniIndeks = Math.floor(Math.random() * znaki.length);
                nakljucnaKoda += znaki.charAt(nakljucniIndeks);
            }

            // Poiščemo povezavo in ji nastavimo končni tekst (fiksni del + generirana koda)
            document.getElementById('koda-povezava').innerText = "Koda klica: " + nakljucnaKoda;
        };
    </script>

</body>
</html>
